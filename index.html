<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Monplaisir Goyave</title>
    <style>
        /* Style général */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; }
        
        /* Bandeau de titre principal */
        header { 
            background-color: #2c3e50; 
            color: white; 
            padding: 20px; 
            text-align: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        header h1 { margin: 0; font-size: 24px; letter-spacing: 1px; }

        /* Menu de navigation */
        nav { 
            display: flex; 
            justify-content: center; 
            background-color: #ecf0f1; 
            padding: 10px; 
            border-bottom: 1px solid #dcdde1;
        }
        button { 
            padding: 10px 20px; 
            margin: 0 10px; 
            border: none; 
            border-radius: 4px; 
            background-color: #3498db; 
            color: white; 
            cursor: pointer; 
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover { background-color: #2980b9; }

        /* Zone de contenu */
        #conteneur-principal { 
            max-width: 800px; 
            margin: 30px auto; 
            padding: 20px; 
            background: white; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            min-height: 200px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Application Monplaisir Goyave</h1>
    </header>

    <nav>
        <button onclick="afficher('sonorisation')">Sonorisation</button>
        <button onclick="afficher('territoires')">Territoires</button>
    </nav>

    <div id="conteneur-principal">
        <p style="text-align: center; color: #7f8c8d;">Sélectionnez une section pour commencer le travail.</p>
    </div>

    <script src="App.js"></script>
</body>
</html>
