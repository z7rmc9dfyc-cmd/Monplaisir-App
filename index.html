<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Monplaisir Goyave</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; }
        header { background-color: #2c3e50; color: white; padding: 20px; text-align: center; }
        nav { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            background-color: #ecf0f1; 
            padding: 10px; 
            gap: 10px;
        }
        button { 
            padding: 10px 15px; 
            border: none; 
            border-radius: 4px; 
            background-color: #3498db; 
            color: white; 
            cursor: pointer; 
            font-weight: bold;
        }
        button:hover { background-color: #2980b9; }
        #conteneur-principal { max-width: 800px; margin: 30px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); min-height: 200px; }
    </style>
</head>
<body>

    <header>
        <h1>Application Monplaisir Goyave</h1>
    </header>

    <nav>
        <button onclick="afficher('discours')">Discours</button>
        <button onclick="afficher('cahier')">Cahier Vie et Min.</button>
        <button onclick="afficher('predication')">Prédication</button>
        <button onclick="afficher('presentoir')">Présentoir</button>
        <button onclick="afficher('sonorisation')">Sonorisation</button>
        <button onclick="afficher('nettoyage')">Nettoyage</button>
        <button onclick="afficher('territoires')">Territoires</button>
    </nav>

    <div id="conteneur-principal">
        <p style="text-align: center; color: #7f8c8d;">Sélectionnez une section pour commencer le travail.</p>
    </div>

    <script src="App.js"></script>
</body>
</html>
